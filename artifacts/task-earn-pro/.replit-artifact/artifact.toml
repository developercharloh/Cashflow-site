kind = "web"
previewPath = "/"
title = "TaskEarn Pro"
version = "1.0.0"
id = "artifacts/task-earn-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24629

[services.development]
run = "pnpm --filter @workspace/task-earn-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/task-earn-pro", "run", "build" ]
publicDir = "artifacts/task-earn-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24629"
BASE_PATH = "/"
