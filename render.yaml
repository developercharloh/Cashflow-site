services:
  - type: web
    name: taskearn-api
    runtime: node
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/db run push && node --enable-source-maps artifacts/api-server/dist/index.mjs
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taskearn-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: PAYSTACK_WEBHOOK_URL
        sync: false

databases:
  - name: taskearn-db
    databaseName: taskearndb
    user: taskearnuser
    plan: free
