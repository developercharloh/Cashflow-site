openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TaskEarn Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: tasks
  - name: wallet
  - name: referrals
  - name: quiz
  - name: dashboard
  - name: notifications
  - name: leaderboard
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/claim-welcome-gift:
    post:
      operationId: claimWelcomeGift
      tags: [auth]
      summary: Claim one-time Starter Gift Card ($0.10)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gift claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Already claimed

  # ─── QUIZ ────────────────────────────────────────────────────────────────────
  /quiz/questions:
    get:
      operationId: getQuizQuestions
      tags: [quiz]
      summary: Get welcome quiz questions (10 random)
      responses:
        "200":
          description: Quiz questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizQuestion"

  /quiz/submit:
    post:
      operationId: submitQuiz
      tags: [quiz]
      summary: Submit welcome quiz answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Quiz result with bonus credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get user dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/earnings-chart:
    get:
      operationId: getEarningsChart
      tags: [dashboard]
      summary: Get earnings chart data (last 30 days)
      responses:
        "200":
          description: Earnings chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get available tasks
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/start:
    post:
      operationId: startTask
      tags: [tasks]
      summary: Start a task and receive questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task started with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStartResult"

  /tasks/{id}/submit:
    post:
      operationId: submitTask
      tags: [tasks]
      summary: Submit task answers and earn reward if 100% correct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskSubmitInput"
      responses:
        "200":
          description: Task submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmitResult"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Legacy complete endpoint (deprecated)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCompletionInput"
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompletionResult"

  /tasks/history:
    get:
      operationId: getTaskHistory
      tags: [tasks]
      summary: Get user task attempt history
      responses:
        "200":
          description: Task attempt history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskAttemptSummary"

  /tasks/categories:
    get:
      operationId: getTaskCategories
      tags: [tasks]
      summary: Get all task categories with counts
      responses:
        "200":
          description: Task categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskCategory"

  /tasks/daily-checkin:
    post:
      operationId: dailyCheckIn
      tags: [tasks]
      summary: Perform daily check-in
      responses:
        "200":
          description: Check-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResult"

  # ─── WALLET ──────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balance summary
      responses:
        "200":
          description: Wallet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [wallet]
      summary: Get transaction history
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /wallet/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [wallet]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "200":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Insufficient balance

  # ─── PAYSTACK ────────────────────────────────────────────────────────────────
  /paystack/deposit/initialize:
    post:
      operationId: initializeDeposit
      tags: [wallet]
      summary: Initialize a Paystack deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInitInput"
      responses:
        "200":
          description: Authorization URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositInitResponse"
        "400":
          description: Validation error

  /paystack/deposit/charge:
    post:
      operationId: chargeDeposit
      tags: [wallet]
      summary: Directly charge mobile money (M-Pesa/Airtel) — STK push, no redirect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositChargeInput"
      responses:
        "200":
          description: STK push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositChargeResponse"
        "400":
          description: Validation error

  /paystack/deposit/verify-pending:
    post:
      operationId: verifyPendingDeposits
      tags: [wallet]
      summary: Auto-verify all pending deposits for the logged-in user
      responses:
        "200":
          description: Credits applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPendingResult"

  /paystack/deposit/verify/{reference}:
    get:
      operationId: verifyDeposit
      tags: [wallet]
      summary: Verify a Paystack deposit by reference
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deposit verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Not successful

  /paystack/withdraw/mobile:
    post:
      operationId: paystackWithdrawMobile
      tags: [wallet]
      summary: Instant M-Pesa or Airtel Money withdrawal via Paystack Transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileWithdrawInput"
      responses:
        "200":
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystackTransferResult"
        "400":
          description: Insufficient balance or bad input

  /paystack/withdraw:
    post:
      operationId: paystackWithdraw
      tags: [wallet]
      summary: Initiate a Paystack bank transfer withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaystackWithdrawInput"
      responses:
        "200":
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystackTransferResult"
        "400":
          description: Insufficient balance or bad input

  /paystack/banks:
    get:
      operationId: getBanks
      tags: [wallet]
      summary: List supported banks for withdrawal
      responses:
        "200":
          description: List of banks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bank"

  /paystack/upgrade/initialize:
    post:
      operationId: initializeUpgrade
      tags: [wallet]
      summary: Initialize Paystack payment to upgrade membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeInitInput"
      responses:
        "200":
          description: Authorization URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositInitResponse"
        "400":
          description: Error

  /paystack/upgrade/verify/{reference}:
    get:
      operationId: verifyUpgrade
      tags: [wallet]
      summary: Verify membership upgrade payment
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upgrade applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /paystack/transcription/buy:
    post:
      operationId: buyTranscriptionMinutes
      tags: [wallet]
      summary: Buy transcription minutes via Paystack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyMinutesInput"
      responses:
        "200":
          description: Redirect URL for payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositInitResponse"

  /kyc/status:
    get:
      operationId: getKycStatus
      tags: [kyc]
      summary: Get the current user's KYC verification status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"

  /kyc/session:
    post:
      operationId: createKycSession
      tags: [kyc]
      summary: Create a Didit identity verification session
      responses:
        "200":
          description: Verification session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycSessionResponse"

  /kyc/submit:
    post:
      operationId: submitKyc
      tags: [kyc]
      summary: Submit personal info for KYC verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycSubmitInput"
      responses:
        "200":
          description: Didit session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycSessionResponse"

  /kyc/upload-documents:
    post:
      operationId: uploadKycDocuments
      tags: [kyc]
      summary: Upload ID document photos for manual KYC review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUploadInput"
      responses:
        "200":
          description: Documents uploaded, pending admin review

  /kyc/admin/submissions:
    get:
      operationId: getKycSubmissions
      tags: [kyc]
      summary: Admin — list all KYC submissions
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KycSubmission"

  /kyc/admin/submissions/{id}/review:
    put:
      operationId: reviewKycSubmission
      tags: [kyc]
      summary: Admin — approve, reject, or request resubmission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycReviewInput"
      responses:
        "200":
          description: Updated

  /kyc/webhook:
    post:
      operationId: kycWebhook
      tags: [kyc]
      summary: Didit webhook — called when verification completes
      responses:
        "200":
          description: OK

  /paystack/webhook:
    post:
      operationId: paystackWebhook
      tags: [wallet]
      summary: Paystack webhook receiver
      responses:
        "200":
          description: OK

  # ─── REFERRALS ───────────────────────────────────────────────────────────────
  /referrals:
    get:
      operationId: getReferralInfo
      tags: [referrals]
      summary: Get user's referral info and stats
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referrals/list:
    get:
      operationId: getReferralList
      tags: [referrals]
      summary: Get list of referred users
      responses:
        "200":
          description: Referred users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferredUser"

  # ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get user notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── LEADERBOARD ─────────────────────────────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [earners, referrers, completers]
        - name: period
          in: query
          schema:
            type: string
            enum: [weekly, monthly, alltime]
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ─── MEMBERSHIP ──────────────────────────────────────────────────────────────
  /membership/levels:
    get:
      operationId: getMembershipLevels
      tags: [users]
      summary: Get all membership levels
      responses:
        "200":
          description: Membership levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipLevel"

  # ─── ADMIN ───────────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Admin — list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/ban:
    patch:
      operationId: adminBanUser
      tags: [admin]
      summary: Admin — ban/unban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanUserInput"
      responses:
        "200":
          description: User ban status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/tasks:
    get:
      operationId: adminGetTasks
      tags: [admin]
      summary: Admin — list all tasks
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: adminCreateTask
      tags: [admin]
      summary: Admin — create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /admin/tasks/{id}:
    patch:
      operationId: adminUpdateTask
      tags: [admin]
      summary: Admin — update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: adminDeleteTask
      tags: [admin]
      summary: Admin — delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/withdrawals:
    get:
      operationId: adminGetWithdrawals
      tags: [admin]
      summary: Admin — list withdrawal requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}/approve:
    patch:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Admin — approve withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}/reject:
    patch:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Admin — reject withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawal"

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin]
      summary: Admin — platform analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"

  /admin/announcements:
    post:
      operationId: adminCreateAnnouncement
      tags: [admin]
      summary: Admin — create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

